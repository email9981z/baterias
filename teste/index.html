<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moura Fácil - Delivery Oficial de Baterias Moura</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --moura-blue: #163150;
            --moura-orange: #f9a01b;
            --moura-light-blue: #326eb3;
            --moura-text: #242933;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--moura-text);
            background-color: #f8f9fa;
            min-height: 100vh;
            /* Fundo sutil para desktop */
            background-image: linear-gradient(rgba(255,255,255,0.85), rgba(255,255,255,0.85)), url('https://mourafacil.moura.com.br/_next/image?url=%2F_next%2Fstatic%2Fmedia%2Fbg-hero.d3c6e9e6.png&w=1920&q=75');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .hero-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: 100vh;
            gap: 40px;
        }

        .hero-content {
            flex: 1;
            padding: 40px 0;
        }

        .hero-image {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .hero-image img {
            max-width: 100%;
            height: auto;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        h1 {
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 4.5rem;
            line-height: 1.1;
            color: var(--moura-blue);
            margin-top: 20px;
        }

        h1 span {
            color: var(--moura-orange);
            text-decoration: none;
            display: block;
        }

        h3 {
            font-family: 'Poppins', sans-serif;
            color: var(--moura-blue);
            font-size: 2.5rem;
            font-weight: 700;
        }

        .margemlateral {
            margin-left: 0;
        }

        .span-destaque {
            color: var(--moura-light-blue);
            font-weight: 700;
        }

        a.btn-moura {
            background-color: var(--moura-orange);
            color: var(--moura-blue) !important;
            width: 320px;
            transition: all 0.3s ease;
            border: none;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            box-shadow: 0 8px 20px rgba(249, 160, 27, 0.3);
        }

        a.btn-moura:hover {
            background-color: #e59218;
            transform: scale(1.05);
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }

        p {
            font-family: 'Inter', sans-serif;
            line-height: 1.4;
            font-size: 1.5rem;
            color: var(--moura-text);
        }

        .logo-container {
            margin-bottom: 30px;
        }

        .logo-moura {
            max-width: 280px;
            height: auto;
        }

        .badge-moura {
            display: inline-block;
            background-color: var(--moura-orange);
            color: var(--moura-blue);
            padding: 8px 16px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.9rem;
            margin-bottom: 20px;
            font-family: 'Poppins', sans-serif;
        }

        .contact-info {
            margin-top: 40px;
            padding: 20px;
            background-color: rgba(22, 49, 80, 0.05);
            border-left: 4px solid var(--moura-orange);
            border-radius: 8px;
        }

        .contact-info h3 {
            margin-bottom: 5px;
        }

        .contact-info p {
            margin: 0;
            font-size: 0.95rem;
        }

        @media (max-width: 991.98px) {
            body {
                background-position: center;
            }

            .hero-container {
                flex-direction: column;
                min-height: auto;
                gap: 30px;
                padding: 20px 0;
            }

            .hero-content {
                padding: 0;
                text-align: center;
            }

            .hero-image {
                order: -1;
                margin-bottom: 20px;
            }

            .hero-image img {
                max-width: 90%;
            }

            h1 {
                font-size: 2.8rem;
                margin-top: 10px;
            }

            h1 span {
                display: inline;
            }

            p {
                font-size: 1.2rem;
            }

            .margemlateral {
                margin-left: 0;
                padding: 0 20px;
            }

            a.btn-moura {
                width: 260px;
                font-size: 1.2rem !important;
                margin: 0 auto;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            h3 {
                font-size: 2rem;
                margin-top: 30px;
            }

            .logo-container {
                text-align: center;
            }

            .contact-info {
                text-align: center;
                border-left: none;
                border-top: 4px solid var(--moura-orange);
            }
        }

        @media (max-width: 575.98px) {
            h1 {
                font-size: 2.2rem;
            }
            
            p {
                font-size: 1.1rem;
            }

            .logo-moura {
                max-width: 200px;
            }

            a.btn-moura {
                width: 100%;
                max-width: 280px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero-container">
            <!-- Conteúdo de texto -->
            <div class="hero-content margemlateral">
                <div class="logo-container">
                    <!-- Logo oficial da Moura Fácil -->
                    <img src="https://mourafacil.moura.com.br/_next/static/media/logo-moura-facil.5e6c7c1b.svg" alt="Moura Fácil" class="logo-moura">
                </div>

                <div class="badge-moura">
                    <i class="bi bi-lightning-fill"></i> Entrega Rápida
                </div>

                <h1>
                    Bateria em até <br>
                    <span>50 minutos.</span> 
                </h1>

                <p class="mt-4 mb-5">
                    A bateria do seu carro entregue e <br>
                    instalada com <span class="span-destaque">entrega e instalação grátis.</span><br>
                    Peça agora pelo WhatsApp e pague <br>
                    somente na entrega!
                </p>

                <a class="btn btn-moura text-uppercase p-3 mb-4 rounded-5 fs-3 d-inline-flex align-items-center justify-content-center" href="https://api.whatsapp.com/send/?phone=55080030030789&text=Olá,%20preciso%20de%20uma%20bateria%20Moura.&type=phone_number&app_absent=0" target="_blank" role="button">
                    <i class="bi bi-whatsapp me-2"></i> PEÇA AGORA
                </a>
                
                <div class="contact-info">
                    <h3 class="fw-bold">3003.0789</h3>
                    <p>Atendimento das 9h às 18h (dias úteis)</p>
                </div>
            </div>

            <!-- Imagem de destaque -->
            <div class="hero-image">
                <img src="https://mourafacil.moura.com.br/_next/image?url=%2F_next%2Fstatic%2Fmedia%2Fhero-image.c1d2e3f4.png&w=600&q=75" alt="Técnico Moura instalando bateria no carro" title="Serviço de instalação de bateria Moura">
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const botao = document.querySelector('a.btn-moura');
            
            if (botao) {
                botao.addEventListener('mousedown', function() {
                    this.style.transform = 'scale(0.95)';
                });
                
                botao.addEventListener('mouseup', function() {
                    this.style.transform = 'scale(1.05)';
                });

                botao.addEventListener('mouseleave', function() {
                    this.style.transform = 'scale(1)';
                });
            }
        });
    </script>
</body>
</html>
