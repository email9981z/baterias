    <style>

            font-family: GTAmerica;

        @font-face {
            font-family: GTAmericaRegular;

        }

        * {
            margin: 0;
            padding: 0;

        h1 {
            font-family: GTAmerica, sans-serif;
            font-size: 7.5em;

            margin-top: 50px;

        }

            color: #f0b03d;
        }

        .margemlateral {
            margin-left: 60px;
        }

        span {
            text-decoration: underline;
            font-weight: bold;
        }

        .span2 {
            color: #ff8a30;
            font-weight: bold;
            text-decoration: none !important;
        }

        a.btn {
            background-color: #ff8a30;
            width: 300px;
            transition: all 0.3s ease;
        }

        a.btn:hover {
            background-color: #ff7a1a;
            transform: scale(1.05);
        }

        p {
            font-family: GTAmericaRegular, sans-serif;
            line-height: 1.2;
            font-size: 2.0em;
        }

        body {
            height: 115vh;
            background-image: url('https://www2.copagaz.com.br/chamanozap/img/fundo.jpg');
            background-repeat: no-repeat;
            background-color: #243836;
            background-position: top;
        }

                width: 200px;

                margin: 0 auto;

<body>
    <div class="container">
        <div class="row mt-3 topo">
            <div class="col margemlateral">
                <h1 class="text-left mobileSpace mb-5">
                    Copagaz no Zap.<br>
                    <span>Chamou, <br> pediu, chegou.</span> 
                </h1>

                <p class="text-left fonteMobile mt-5 mb-5">
                    Agora você consegue pedir <br> um botijão Copagaz sem sair <br>
                    do seu Whatsapp.<br> <span class="span2" style="font-weight: bold !important;">É fácil, seguro e super prático.</span> <br>
                    Clique no botão abaixo<br> e adicione o nosso contato!
                </p>

                <a class="btn text-white fw-bold p-3 mb-4 rounded-5 fs-2" href="https://api.whatsapp.com/send/?phone=5511946358091&text=Ol%C3%A1,%20quero%20comprar%20um%20botij%C3%A3o%20de%20g%C3%A1s.&type=phone_number&app_absent=0" target="_blank" role="button">
                    <i class="bi bi-whatsapp"></i> PEÇA AGORA - Receba em 15 Minutos
                </a>
                <h3 class="fw-bold">0800-707-2672</h3>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const botao = document.querySelector('a.btn');
            
            if (botao) {
                botao.addEventListener('click', function(e) {
                    this.style.transform = 'scale(0.95)';
                    setTimeout(() => {
                        this.style.transform = 'scale(1)';
                    }, 100);
                });

                botao.addEventListener('mouseenter', function() {
                    this.style.transition = 'all 0.3s ease';
                });
            }

            document.querySelectorAll('a[href^="#"]').forEach(anchor => {
                anchor.addEventListener('click', function (e) {
                    e.preventDefault();
                    const target = document.querySelector(this.getAttribute('href'));
                    if (target) {
                        target.scrollIntoView({
                            behavior: 'smooth'
                        });
                    }
                });
            });

            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            
            if (isMobile) {
                console.log('Acesso via dispositivo móvel detectado');
            }
        });
    </script>
