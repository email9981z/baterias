<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recarga de Gás 13kg - Ultragaz</title>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-blue: #0055ff;
            --secondary-blue: #00bfff;
            --dark-blue: #0033cc;
            --text-gray: #666;
            --light-gray: #f5f5f5;
            --white: #ffffff;
            --success-green: #28a745;
            --shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f9f9f9;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            background-color: var(--white);
            box-shadow: var(--shadow);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 1;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--primary-blue) 0%, var(--dark-blue) 100%);
            color: var(--white);
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .back-btn {
            background: none;
            border: none;
            color: var(--white);
            font-size: 1.2rem;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .back-btn:hover {
            transform: scale(1.1);
        }

        .header-title h1 {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .header-title span {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .header-cart-btn {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: var(--white);
            width: 42px;
            height: 42px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
        }

        .header-cart-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
        }

        .cart-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background-color: #ff3b30;
            color: white;
            font-size: 0.7rem;
            font-weight: bold;
            min-width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2px;
            border: 2px solid var(--primary-blue);
            opacity: 0;
            transform: scale(0);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .cart-badge.active {
            opacity: 1;
            transform: scale(1);
        }

        /* Promo Banner */
        .promo-banner {
            background: linear-gradient(135deg, #00e5ff 0%, #00bfff 100%);
            color: #003366;
            padding: 12px;
            text-align: center;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.08);
        }

        .promo-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .promo-timer {
            font-size: 1.1rem;
            font-weight: bold;
        }

        /* Delivery Promise Banner */
        .delivery-banner {
            background-color: var(--success-green);
            color: var(--white);
            padding: 12px;
            text-align: center;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 0.95rem;
        }

        .delivery-icon {
            font-size: 1.3rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        /* Product Main */
        .product-main {
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-y: auto;
        }

        /* Image Gallery Container */
        .product-image-gallery {
            width: 100%;
            max-width: 250px;
            margin: 20px 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .product-image-container {
            width: 100%;
            height: 250px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--light-gray);
            border-radius: 12px;
            padding: 20px;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .product-image {
            max-width: 100%;
            max-height: 100%;
            height: auto;
            object-fit: contain;
            transition: transform 0.3s ease;
        }

        .carousel-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-top: 5px;
        }

        .carousel-indicators {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ddd;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
        }

        .indicator.active {
            background: var(--primary-blue);
            width: 30px;
            border-radius: 5px;
        }

        /* Pricing Section */
        .pricing-section {
            width: 100%;
            background-color: #fff;
            border: 1px solid #eee;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .current-price {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--primary-blue);
        }

        .old-price {
            font-size: 1.1rem;
            color: #999;
            text-decoration: line-through;
        }

        /* Continue Button */
        .continue-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--primary-blue) 0%, var(--dark-blue) 100%);
            color: var(--white);
            border: none;
            padding: 18px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 6px 20px rgba(0, 85, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 40px;
        }

        /* Cart Sidebar */
        .cart-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            display: none;
            z-index: 999;
        }

        .cart-overlay.active { display: block; }

        .cart-sidebar {
            position: fixed;
            right: -400px;
            top: 0;
            width: 400px;
            height: 100vh;
            background-color: var(--white);
            box-shadow: -4px 0 12px rgba(0, 0, 0, 0.15);
            display: flex;
            flex-direction: column;
            z-index: 1000;
            transition: right 0.3s ease;
        }

        .cart-sidebar.active { right: 0; }

        .cart-header {
            background: linear-gradient(135deg, var(--primary-blue) 0%, var(--dark-blue) 100%);
            color: var(--white);
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .cart-content { flex: 1; overflow-y: auto; padding: 20px; }

        .cart-item {
            background-color: var(--light-gray);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: flex;
            gap: 12px;
        }

        .cart-item-image { width: 70px; height: 70px; background-color: var(--white); border-radius: 6px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .cart-item-image img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .cart-summary { padding: 20px; background-color: var(--light-gray); }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 12px; }
        .summary-row.total { font-weight: bold; font-size: 1.1rem; border-top: 1px solid #ddd; padding-top: 12px; }

        .proceed-btn { width: 100%; background: var(--success-green); color: white; border: none; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* Quantity Selector */
        .quantity-selector { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; background-color: var(--light-gray); padding: 15px 20px; border-radius: 10px; }
        .qty-btn { background: none; border: none; color: var(--primary-blue); font-size: 2.2rem; cursor: pointer; }
        .qty-number { font-size: 1.8rem; font-weight: 600; }

        .checkbox-container { display: flex; align-items: center; gap: 10px; cursor: pointer; margin-bottom: 30px; }

        @media (max-width: 768px) { .cart-sidebar { width: 100%; right: -100%; } }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="header-left">
                <button class="back-btn"><i class="fas fa-arrow-left"></i></button>
                <div class="header-title">
                    <h1>Gás de Cozinha</h1>
                    <span>Recarga 13kg</span>
                </div>
            </div>
            <div id="header-cart-btn" class="header-cart-btn">
                <i class="fas fa-shopping-basket"></i>
                <span id="cart-badge" class="cart-badge">0</span>
            </div>
        </header>

        <div class="promo-banner">
            <div class="promo-content">
                <i class="fas fa-percent"></i>
                <span>PROMOÇÃO TERMINA EM:</span>
                <span id="countdown" class="promo-timer">0d 0h 0m</span>
            </div>
        </div>

        <div class="delivery-banner">
            <i class="fas fa-truck delivery-icon"></i>
            <span>Entrega rápida em até 30 minutos!</span>
        </div>

        <main class="product-main">
            <div class="product-image-gallery">
                <div class="product-image-container" id="image-tap-area">
                    <img id="main-product-image" src="https://www.ultragaz.com.br/wp-content/uploads/2021/08/botijao-de-gas-13kg.png" alt="Botijão de Gás Ultragaz" class="product-image">
                </div>
                <div class="carousel-controls">
                    <div class="carousel-indicators" id="carousel-indicators"></div>
                </div>
            </div>

            <div class="quantity-selector">
                <button id="decrease-qty" class="qty-btn"><i class="fas fa-minus-circle"></i></button>
                <span id="quantity" class="qty-number">1</span>
                <button id="increase-qty" class="qty-btn"><i class="fas fa-plus-circle"></i></button>
            </div>

            <label class="checkbox-container">
                <input type="checkbox" id="include-cylinder"> Incluir vasilhame (+ R$ 190,00)
            </label>

            <div class="pricing-section">
                <span class="old-price" id="old-price">R$ 105,00</span>
                <span class="current-price" id="current-price">R$ 90,00</span>
                <span id="unit-price-label" style="font-size:0.8rem; color:#666;">Valor de uma recarga: R$ 90,00</span>
            </div>

            <button id="order-btn" class="continue-btn">
                <i class="fas fa-shopping-cart"></i> PEDIR AGORA
            </button>
        </main>
    </div>

    <div id="cart-overlay" class="cart-overlay"></div>
    <div id="cart-sidebar" class="cart-sidebar">
        <div class="cart-header">
            <h2><i class="fas fa-shopping-bag"></i> Carrinho</h2>
            <button id="cart-close-btn" style="background:none; border:none; color:white; font-size:1.5rem; cursor:pointer;"><i class="fas fa-times"></i></button>
        </div>
        <div class="cart-content" id="cart-items-container"></div>
        <div class="cart-summary">
            <div class="summary-row"><span>Subtotal:</span><span id="subtotal">R$ 0,00</span></div>
            <div class="summary-row total"><span>Total:</span><span id="cart-total">R$ 0,00</span></div>
            <button id="proceed-btn" class="proceed-btn">FINALIZAR PEDIDO</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // ==================== IMAGE GALLERY CONFIGURATION ====================
            // Usando links diretos de imagens diferentes da Ultragaz para demonstrar o carrossel
            const productImages = [
                {
                    main: 'https://www.ultragaz.com.br/wp-content/uploads/2021/08/botijao-de-gas-13kg.png',
                    alt: 'Botijão de Gás - Vista Principal'
                },
                {
                    main: 'https://www.ultragaz.com.br/wp-content/uploads/2021/08/botijao-P20.png',
                    alt: 'Botijão de Gás - Vista Lateral'
                },
                {
                    main: 'https://www.ultragaz.com.br/wp-content/uploads/2021/08/botijao-P45.png',
                    alt: 'Botijão de Gás - Detalhes'
                }
            ];

            const mainImage = document.getElementById('main-product-image');
            const indicatorsContainer = document.getElementById('carousel-indicators');
            const imageTapArea = document.getElementById('image-tap-area');
            const quantityEl = document.getElementById('quantity');
            const includeCylinderCheckbox = document.getElementById('include-cylinder');
            const oldPriceEl = document.getElementById('old-price');
            const currentPriceEl = document.getElementById('current-price');
            const unitPriceLabelEl = document.getElementById('unit-price-label');
            const cartBadge = document.getElementById('cart-badge');
            const cartItemsContainer = document.getElementById('cart-items-container');
            const subtotalEl = document.getElementById('subtotal');
            const cartTotalEl = document.getElementById('cart-total');

            let quantity = 1;
            let currentImageIndex = 0;
            let cartItemsCount = 0;

            const initializeGallery = () => {
                indicatorsContainer.innerHTML = '';
                productImages.forEach((_, index) => {
                    const indicator = document.createElement('div');
                    indicator.className = `indicator ${index === 0 ? 'active' : ''}`;
                    indicator.onclick = () => { currentImageIndex = index; updateGallery(); };
                    indicatorsContainer.appendChild(indicator);
                });
            };

            const updateGallery = () => {
                mainImage.src = productImages[currentImageIndex].main;
                document.querySelectorAll('.indicator').forEach((ind, i) => ind.classList.toggle('active', i === currentImageIndex));
            };

            imageTapArea.onclick = () => { currentImageIndex = (currentImageIndex + 1) % productImages.length; updateGallery(); };

            const updatePricing = () => {
                let price = (90 * quantity) + (includeCylinderCheckbox.checked ? 190 * quantity : 0);
                let old = (105 * quantity) + (includeCylinderCheckbox.checked ? 190 * quantity : 0);
                currentPriceEl.innerText = price.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
                oldPriceEl.innerText = old.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
                unitPriceLabelEl.innerText = `Valor unitário: ${(price/quantity).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })}`;
            };

            const updateCart = () => {
                cartBadge.innerText = cartItemsCount;
                cartBadge.classList.toggle('active', cartItemsCount > 0);
                if (cartItemsCount > 0) {
                    let price = (90 * quantity) + (includeCylinderCheckbox.checked ? 190 * quantity : 0);
                    cartItemsContainer.innerHTML = `
                        <div class="cart-item">
                            <div class="cart-item-image"><img src="${productImages[0].main}"></div>
                            <div style="flex:1">
                                <strong>Recarga 13kg</strong><br>
                                <small>${quantity}x | ${includeCylinderCheckbox.checked ? 'Com vasilhame' : 'Apenas recarga'}</small><br>
                                <strong>${price.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })}</strong>
                            </div>
                            <button onclick="removeItem()" style="background:none; border:none; color:red; cursor:pointer"><i class="fas fa-trash"></i></button>
                        </div>`;
                    subtotalEl.innerText = price.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
                    cartTotalEl.innerText = price.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
                } else {
                    cartItemsContainer.innerHTML = '<p style="text-align:center; color:#999">Carrinho vazio</p>';
                    subtotalEl.innerText = 'R$ 0,00';
                    cartTotalEl.innerText = 'R$ 0,00';
                }
            };

            window.removeItem = () => { cartItemsCount = 0; updateCart(); };

            document.getElementById('increase-qty').onclick = () => { quantity++; quantityEl.innerText = quantity; updatePricing(); if(cartItemsCount>0) updateCart(); };
            document.getElementById('decrease-qty').onclick = () => { if(quantity>1) { quantity--; quantityEl.innerText = quantity; updatePricing(); if(cartItemsCount>0) updateCart(); } };
            includeCylinderCheckbox.onchange = () => { updatePricing(); if(cartItemsCount>0) updateCart(); };
            document.getElementById('order-btn').onclick = () => { cartItemsCount = 1; updateCart(); document.getElementById('cart-sidebar').classList.add('active'); document.getElementById('cart-overlay').classList.add('active'); };
            document.getElementById('header-cart-btn').onclick = () => { document.getElementById('cart-sidebar').classList.add('active'); document.getElementById('cart-overlay').classList.add('active'); };
            document.getElementById('cart-close-btn').onclick = () => { document.getElementById('cart-sidebar').classList.remove('active'); document.getElementById('cart-overlay').classList.remove('active'); };
            document.getElementById('cart-overlay').onclick = () => { document.getElementById('cart-sidebar').classList.remove('active'); document.getElementById('cart-overlay').classList.remove('active'); };

            initializeGallery();
            updatePricing();
        });
    </script>
</body>
</html>
