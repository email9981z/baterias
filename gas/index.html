<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recarga de Gás 13kg - Ultragaz</title>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-blue: #0055ff;
            --secondary-blue: #00bfff;
            --dark-blue: #0033cc;
            --text-gray: #666;
            --light-gray: #f5f5f5;
            --white: #ffffff;
            --success-green: #28a745;
            --shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f9f9f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            background-color: var(--white);
            box-shadow: var(--shadow);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--primary-blue) 0%, var(--dark-blue) 100%);
            color: var(--white);
            padding: 15px;
            display: flex;
            align-items: center;
            position: relative;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }

        .back-btn {
            background: none;
            border: none;
            color: var(--white);
            font-size: 1.2rem;
            cursor: pointer;
            margin-right: 15px;
            transition: transform 0.2s;
        }

        .back-btn:hover {
            transform: scale(1.1);
        }

        .header-title h1 {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .header-title span {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        /* Promo Banner */
        .promo-banner {
            background: linear-gradient(135deg, #00e5ff 0%, #00bfff 100%);
            color: #003366;
            padding: 12px;
            text-align: center;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.08);
        }

        .promo-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .promo-icon {
            font-size: 1.2rem;
        }

        .promo-text {
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        .promo-timer {
            font-size: 1.1rem;
            font-weight: bold;
        }

        /* Delivery Promise Banner */
        .delivery-banner {
            background-color: var(--success-green);
            color: var(--white);
            padding: 12px;
            text-align: center;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 0.95rem;
        }

        .delivery-icon {
            font-size: 1.3rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        /* Product Main */
        .product-main {
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-y: auto;
        }

        .product-image-container {
            width: 100%;
            max-width: 250px;
            margin: 20px 0;
            display: flex;
            justify-content: center;
            background-color: var(--light-gray);
            border-radius: 12px;
            padding: 20px;
        }

        .product-image {
            max-width: 100%;
            height: auto;
            object-fit: contain;
        }

        .product-options {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 0.95rem;
            padding: 0 10px;
        }

        .option-label {
            color: var(--text-gray);
            font-weight: 500;
        }

        .rules-link {
            color: var(--primary-blue);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: color 0.2s;
        }

        .rules-link:hover {
            color: var(--dark-blue);
        }

        /* Quantity Selector */
        .quantity-selector {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            background-color: var(--light-gray);
            padding: 15px 20px;
            border-radius: 10px;
        }

        .qty-btn {
            background: none;
            border: none;
            color: var(--primary-blue);
            font-size: 2.2rem;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .qty-btn:active {
            transform: scale(0.9);
        }

        .qty-number {
            font-size: 1.8rem;
            font-weight: 600;
            min-width: 30px;
            text-align: center;
        }

        /* Additional Options */
        .additional-options {
            width: 100%;
            margin-bottom: 30px;
            padding: 0 10px;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            position: relative;
            padding-left: 35px;
            cursor: pointer;
            font-size: 0.95rem;
            user-select: none;
            color: var(--text-gray);
            margin-bottom: 12px;
        }

        .checkbox-container input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
            height: 0;
            width: 0;
        }

        .checkmark {
            position: absolute;
            top: 0;
            left: 0;
            height: 22px;
            width: 22px;
            background-color: #eee;
            border-radius: 4px;
            border: 2px solid #ccc;
            transition: all 0.2s;
        }

        .checkbox-container:hover input ~ .checkmark {
            background-color: #ddd;
        }

        .checkbox-container input:checked ~ .checkmark {
            background-color: var(--primary-blue);
            border-color: var(--primary-blue);
        }

        .checkmark:after {
            content: "";
            position: absolute;
            display: none;
        }

        .checkbox-container input:checked ~ .checkmark:after {
            display: block;
        }

        .checkbox-container .checkmark:after {
            left: 7px;
            top: 3px;
            width: 5px;
            height: 10px;
            border: solid white;
            border-width: 0 3px 3px 0;
            transform: rotate(45deg);
        }

        /* Pricing Section */
        .pricing-section {
            width: 100%;
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background-color: var(--light-gray);
            border-radius: 10px;
        }

        .total-label {
            display: block;
            color: var(--text-gray);
            font-size: 0.9rem;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .price-container {
            display: flex;
            flex-direction: column;
            margin-bottom: 10px;
        }

        .old-price {
            text-decoration: line-through;
            color: #999;
            font-size: 1.2rem;
        }

        .current-price {
            color: var(--primary-blue);
            font-size: 2.5rem;
            font-weight: bold;
        }

        .unit-price {
            display: block;
            color: var(--text-gray);
            font-size: 0.85rem;
            margin-top: 8px;
        }

        /* Action Button */
        .continue-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--primary-blue) 0%, var(--dark-blue) 100%);
            color: var(--white);
            border: none;
            padding: 16px;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s;
            box-shadow: 0 4px 12px rgba(0, 85, 255, 0.3);
        }

        .continue-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0, 85, 255, 0.4);
        }

        .continue-btn:active {
            transform: translateY(0);
        }

        .continue-btn i {
            font-size: 1.2rem;
        }

        /* Cart Sidebar */
        .cart-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            display: none;
            z-index: 999;
            animation: fadeIn 0.3s ease;
        }

        .cart-overlay.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .cart-sidebar {
            position: fixed;
            right: -400px;
            top: 0;
            width: 400px;
            height: 100vh;
            background-color: var(--white);
            box-shadow: -4px 0 15px rgba(0, 0, 0, 0.2);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            transition: right 0.3s ease;
        }

        .cart-sidebar.active {
            right: 0;
        }

        .cart-header {
            background: linear-gradient(135deg, var(--primary-blue) 0%, var(--dark-blue) 100%);
            color: var(--white);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }

        .cart-header h2 {
            font-size: 1.3rem;
            font-weight: 600;
        }

        .cart-close-btn {
            background: none;
            border: none;
            color: var(--white);
            font-size: 1.5rem;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .cart-close-btn:hover {
            transform: scale(1.1);
        }

        .cart-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .cart-item {
            background-color: var(--light-gray);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 4px solid var(--primary-blue);
        }

        .cart-item-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 1rem;
        }

        .cart-item-details {
            font-size: 0.9rem;
            color: var(--text-gray);
            margin-bottom: 8px;
        }

        .cart-item-price {
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--primary-blue);
        }

        .cart-summary {
            padding: 20px;
            border-top: 1px solid #eee;
            background-color: var(--light-gray);
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.95rem;
        }

        .summary-row.total {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--primary-blue);
            border-top: 1px solid #ddd;
            padding-top: 10px;
            margin-top: 10px;
        }

        .proceed-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--success-green) 0%, #20c997 100%);
            color: var(--white);
            border: none;
            padding: 16px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 12px rgba(40, 167, 69, 0.3);
            margin-top: 15px;
        }

        .proceed-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(40, 167, 69, 0.4);
        }

        .proceed-btn:active {
            transform: translateY(0);
        }

        .proceed-btn i {
            margin-right: 8px;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .app-container {
                max-width: 100%;
                box-shadow: none;
            }

            .cart-sidebar {
                width: 100%;
                right: -100%;
            }
        }

        @media (max-width: 480px) {
            .product-main {
                padding: 15px;
            }

            .pricing-section {
                padding: 15px;
            }

            .current-price {
                font-size: 2rem;
            }

            .quantity-selector {
                padding: 12px 15px;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <button class="back-btn"><i class="fas fa-arrow-left"></i></button>
            <div class="header-title">
                <h1>Gás de Cozinha</h1>
                <span>Recarga 13kg</span>
            </div>
        </header>

        <!-- Promo Banner -->
        <div class="promo-banner">
            <div class="promo-content">
                <i class="fas fa-percent promo-icon"></i>
                <span class="promo-text">PROMOÇÃO TERMINA EM:</span>
                <span id="countdown" class="promo-timer">0d 0h 0m</span>
            </div>
        </div>

        <!-- Delivery Promise Banner -->
        <div class="delivery-banner">
            <i class="fas fa-truck delivery-icon"></i>
            <span>Receba em 20 Minutos</span>
        </div>

        <!-- Product Content -->
        <main class="product-main">
            <div class="product-image-container">
                <img src="https://www.ultragaz.com.br/wp-content/uploads/2021/08/botijao-de-gas-13kg.png" alt="Botijão de Gás Ultragaz" class="product-image">
            </div>

            <div class="product-options">
                <span class="option-label">Padrão</span>
                <a href="#" class="rules-link">Verificar regras <i class="fas fa-chevron-right"></i></a>
            </div>

            <!-- Quantity Selector -->
            <div class="quantity-selector">
                <button id="decrease-qty" class="qty-btn"><i class="fas fa-minus-circle"></i></button>
                <span id="quantity" class="qty-number">1</span>
                <button id="increase-qty" class="qty-btn"><i class="fas fa-plus-circle"></i></button>
            </div>

            <!-- Additional Options -->
            <div class="additional-options">
                <label class="checkbox-container">
                    <input type="checkbox" id="include-cylinder">
                    <span class="checkmark"></span>
                    Incluir vasilhame (+ R$ 190,00)
                </label>
            </div>

            <!-- Pricing -->
            <div class="pricing-section">
                <span class="total-label">Total</span>
                <div class="price-container">
                    <span id="old-price" class="old-price">R$ 105,00</span>
                    <span id="current-price" class="current-price">R$ 90,00</span>
                </div>
                <span id="unit-price-label" class="unit-price">Valor de uma recarga: R$ 90,00</span>
            </div>

            <!-- Action Button -->
            <button id="order-btn" class="continue-btn">
                <i class="fas fa-shopping-cart"></i> PEDIR AGORA
            </button>
        </main>
    </div>

    <!-- Cart Overlay -->
    <div id="cart-overlay" class="cart-overlay"></div>

    <!-- Cart Sidebar -->
    <div id="cart-sidebar" class="cart-sidebar">
        <div class="cart-header">
            <h2><i class="fas fa-shopping-bag"></i> Carrinho</h2>
            <button id="cart-close-btn" class="cart-close-btn"><i class="fas fa-times"></i></button>
        </div>

        <div class="cart-content">
            <div id="cart-items-container">
                <!-- Items will be added here dynamically -->
            </div>
        </div>

        <div class="cart-summary">
            <div class="summary-row">
                <span>Subtotal:</span>
                <span id="subtotal">R$ 90,00</span>
            </div>
            <div class="summary-row">
                <span>Taxa de entrega:</span>
                <span id="delivery-fee">Grátis</span>
            </div>
            <div class="summary-row total">
                <span>Total:</span>
                <span id="cart-total">R$ 90,00</span>
            </div>
            <button id="proceed-btn" class="proceed-btn">
                <i class="fas fa-arrow-right"></i> PROSSEGUIR
            </button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Selectors
            const decreaseBtn = document.getElementById('decrease-qty');
            const increaseBtn = document.getElementById('increase-qty');
            const quantityEl = document.getElementById('quantity');
            const includeCylinderCheckbox = document.getElementById('include-cylinder');
            const oldPriceEl = document.getElementById('old-price');
            const currentPriceEl = document.getElementById('current-price');
            const unitPriceLabelEl = document.getElementById('unit-price-label');
            const countdownEl = document.getElementById('countdown');
            const orderBtn = document.getElementById('order-btn');
            const cartOverlay = document.getElementById('cart-overlay');
            const cartSidebar = document.getElementById('cart-sidebar');
            const cartCloseBtn = document.getElementById('cart-close-btn');
            const proceedBtn = document.getElementById('proceed-btn');
            const cartItemsContainer = document.getElementById('cart-items-container');
            const subtotalEl = document.getElementById('subtotal');
            const cartTotalEl = document.getElementById('cart-total');

            // Constants
            const UNIT_REFILL_PRICE = 90.00;
            const UNIT_OLD_PRICE = 105.00;
            const CYLINDER_PRICE = 190.00;
            const CHECKOUT_URL = 'https://example.com/checkout'; // Link de exemplo

            let quantity = 1;

            // Functions
            const formatCurrency = (value) => {
                return value.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            };

            const updatePricing = () => {
                let basePrice = UNIT_REFILL_PRICE * quantity;
                let oldBasePrice = UNIT_OLD_PRICE * quantity;
                
                if (includeCylinderCheckbox.checked) {
                    basePrice += CYLINDER_PRICE * quantity;
                    oldBasePrice += CYLINDER_PRICE * quantity;
                }

                currentPriceEl.textContent = formatCurrency(basePrice);
                oldPriceEl.textContent = formatCurrency(oldBasePrice);
                
                const unitPrice = UNIT_REFILL_PRICE + (includeCylinderCheckbox.checked ? CYLINDER_PRICE : 0);
                unitPriceLabelEl.textContent = `Valor de uma recarga: ${formatCurrency(unitPrice)}`;
            };

            const updateCart = () => {
                let totalPrice = UNIT_REFILL_PRICE * quantity;
                let cylinderInfo = '';

                if (includeCylinderCheckbox.checked) {
                    totalPrice += CYLINDER_PRICE * quantity;
                    cylinderInfo = '<div class="cart-item-details">✓ Com vasilhame</div>';
                }

                cartItemsContainer.innerHTML = `
                    <div class="cart-item">
                        <div class="cart-item-name">Recarga de Gás 13kg</div>
                        <div class="cart-item-details">Quantidade: <strong>${quantity}x</strong></div>
                        ${cylinderInfo}
                        <div class="cart-item-price">${formatCurrency(totalPrice)}</div>
                    </div>
                `;

                subtotalEl.textContent = formatCurrency(totalPrice);
                cartTotalEl.textContent = formatCurrency(totalPrice);
            };

            const openCart = () => {
                cartOverlay.classList.add('active');
                cartSidebar.classList.add('active');
                document.body.style.overflow = 'hidden';
                updateCart();
            };

            const closeCart = () => {
                cartOverlay.classList.remove('active');
                cartSidebar.classList.remove('active');
                document.body.style.overflow = 'auto';
            };

            // Event Listeners
            decreaseBtn.addEventListener('click', () => {
                if (quantity > 1) {
                    quantity--;
                    quantityEl.textContent = quantity;
                    updatePricing();
                }
            });

            increaseBtn.addEventListener('click', () => {
                quantity++;
                quantityEl.textContent = quantity;
                updatePricing();
            });

            includeCylinderCheckbox.addEventListener('change', () => {
                updatePricing();
            });

            orderBtn.addEventListener('click', openCart);
            cartCloseBtn.addEventListener('click', closeCart);
            cartOverlay.addEventListener('click', closeCart);

            proceedBtn.addEventListener('click', () => {
                // Redireciona para o link de checkout
                window.location.href = CHECKOUT_URL;
            });

            // Countdown Timer Logic
            const startCountdown = () => {
                const targetDate = new Date();
                targetDate.setDate(targetDate.getDate() + 4);
                targetDate.setHours(targetDate.getHours() + 8);
                targetDate.setMinutes(targetDate.getMinutes() + 11);

                const updateTimer = () => {
                    const now = new Date().getTime();
                    const distance = targetDate.getTime() - now;

                    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                    const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                    const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));

                    countdownEl.textContent = `${days}d ${hours}h ${minutes}m`;

                    if (distance < 0) {
                        clearInterval(timerInterval);
                        countdownEl.textContent = "EXPIRADO";
                    }
                };

                const timerInterval = setInterval(updateTimer, 60000);
                updateTimer();
            };

            // Initialize
            startCountdown();
            updatePricing();
        });
    </script>
</body>
</html>
