<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recarga de Gás 13kg - Ultragaz</title>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-blue: #0055ff;
            --secondary-blue: #00bfff;
            --dark-blue: #0033cc;
            --text-gray: #666;
            --light-gray: #f5f5f5;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f9f9f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            background-color: var(--white);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            background-color: var(--primary-blue);
            color: var(--white);
            padding: 15px;
            display: flex;
            align-items: center;
            position: relative;
        }

        .back-btn {
            background: none;
            border: none;
            color: var(--white);
            font-size: 1.2rem;
            cursor: pointer;
            margin-right: 15px;
        }

        .header-title h1 {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .header-title span {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        /* Promo Banner */
        .promo-banner {
            background-color: #00e5ff;
            color: #003366;
            padding: 10px;
            text-align: center;
            font-weight: bold;
        }

        .promo-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .promo-icon {
            font-size: 1.2rem;
        }

        .promo-text {
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        .promo-timer {
            font-size: 1.1rem;
        }

        /* Product Main */
        .product-main {
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .product-image-container {
            width: 100%;
            max-width: 250px;
            margin: 20px 0;
            display: flex;
            justify-content: center;
        }

        .product-image {
            max-width: 100%;
            height: auto;
            object-fit: contain;
        }

        .product-options {
            width: 100%;
            display: flex;
            justify-content: space-between;
            margin-bottom: 25px;
            font-size: 0.95rem;
        }

        .option-label {
            color: var(--text-gray);
        }

        .rules-link {
            color: var(--text-gray);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Quantity Selector */
        .quantity-selector {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .qty-btn {
            background: none;
            border: none;
            color: var(--primary-blue);
            font-size: 2.2rem;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .qty-btn:active {
            transform: scale(0.9);
        }

        .qty-number {
            font-size: 1.8rem;
            font-weight: 500;
            min-width: 30px;
            text-align: center;
        }

        /* Additional Options */
        .additional-options {
            width: 100%;
            margin-bottom: 30px;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            position: relative;
            padding-left: 35px;
            cursor: pointer;
            font-size: 0.95rem;
            user-select: none;
            color: var(--text-gray);
        }

        .checkbox-container input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
            height: 0;
            width: 0;
        }

        .checkmark {
            position: absolute;
            top: 0;
            left: 0;
            height: 22px;
            width: 22px;
            background-color: #eee;
            border-radius: 4px;
            border: 1px solid #ccc;
        }

        .checkbox-container:hover input ~ .checkmark {
            background-color: #ccc;
        }

        .checkbox-container input:checked ~ .checkmark {
            background-color: var(--primary-blue);
            border-color: var(--primary-blue);
        }

        .checkmark:after {
            content: "";
            position: absolute;
            display: none;
        }

        .checkbox-container input:checked ~ .checkmark:after {
            display: block;
        }

        .checkbox-container .checkmark:after {
            left: 7px;
            top: 3px;
            width: 5px;
            height: 10px;
            border: solid white;
            border-width: 0 3px 3px 0;
            transform: rotate(45deg);
        }

        /* Pricing Section */
        .pricing-section {
            width: 100%;
            text-align: center;
            margin-bottom: 30px;
        }

        .total-label {
            display: block;
            color: var(--text-gray);
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        .price-container {
            display: flex;
            flex-direction: column;
            margin-bottom: 10px;
        }

        .old-price {
            text-decoration: line-through;
            color: #999;
            font-size: 1.2rem;
        }

        .current-price {
            color: var(--primary-blue);
            font-size: 2.2rem;
            font-weight: bold;
        }

        .unit-price {
            display: block;
            color: var(--text-gray);
            font-size: 0.85rem;
        }

        /* Continue Button */
        .continue-btn {
            width: 100%;
            background-color: var(--primary-blue);
            color: var(--white);
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: background-color 0.3s;
        }

        .continue-btn:hover {
            background-color: var(--dark-blue);
        }

        .continue-btn i {
            font-size: 1.2rem;
        }

        /* Mobile Responsive */
        @media (max-width: 480px) {
            .app-container {
                max-width: 100%;
                box-shadow: none;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <button class="back-btn"><i class="fas fa-arrow-left"></i></button>
            <div class="header-title">
                <h1>Gás de Cozinha</h1>
                <span>Recarga 13kg</span>
            </div>
        </header>

        <!-- Promo Banner -->
        <div class="promo-banner">
            <div class="promo-content">
                <i class="fas fa-percent promo-icon"></i>
                <span class="promo-text">PROMOÇÃO TERMINA EM:</span>
                <span id="countdown" class="promo-timer">0d 0h 0m</span>
            </div>
        </div>

        <!-- Product Content -->
        <main class="product-main">
            <div class="product-image-container">
                <!-- Imagem em base64 ou URL pública para ser um arquivo único funcional -->
                <img src="https://www.ultragaz.com.br/wp-content/uploads/2021/08/botijao-de-gas-13kg.png" alt="Botijão de Gás Ultragaz" class="product-image">
            </div>

            <div class="product-options">
                <span class="option-label">Padrão</span>
                <a href="#" class="rules-link">Verificar regras <i class="fas fa-chevron-right"></i></a>
            </div>

            <!-- Quantity Selector -->
            <div class="quantity-selector">
                <button id="decrease-qty" class="qty-btn"><i class="fas fa-minus-circle"></i></button>
                <span id="quantity" class="qty-number">1</span>
                <button id="increase-qty" class="qty-btn"><i class="fas fa-plus-circle"></i></button>
            </div>

            <!-- Additional Options -->
            <div class="additional-options">
                <label class="checkbox-container">
                    <input type="checkbox" id="include-cylinder">
                    <span class="checkmark"></span>
                    Incluir vasilhame (+ R$ 190,00)
                </label>
            </div>

            <!-- Pricing -->
            <div class="pricing-section">
                <span class="total-label">Total</span>
                <div class="price-container">
                    <span id="old-price" class="old-price">R$ 105,00</span>
                    <span id="current-price" class="current-price">R$ 90,00</span>
                </div>
                <span id="unit-price-label" class="unit-price">Valor de uma recarga: R$ 90,00</span>
            </div>

            <!-- Action Button -->
            <button class="continue-btn">
                <i class="fas fa-check"></i> CONTINUAR
            </button>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Selectors
            const decreaseBtn = document.getElementById('decrease-qty');
            const increaseBtn = document.getElementById('increase-qty');
            const quantityEl = document.getElementById('quantity');
            const includeCylinderCheckbox = document.getElementById('include-cylinder');
            const oldPriceEl = document.getElementById('old-price');
            const currentPriceEl = document.getElementById('current-price');
            const unitPriceLabelEl = document.getElementById('unit-price-label');
            const countdownEl = document.getElementById('countdown');

            // Constants
            const UNIT_REFILL_PRICE = 90.00;
            const UNIT_OLD_PRICE = 105.00;
            const CYLINDER_PRICE = 190.00;

            let quantity = 1;

            // Functions
            const formatCurrency = (value) => {
                return value.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            };

            const updatePricing = () => {
                let basePrice = UNIT_REFILL_PRICE * quantity;
                let oldBasePrice = UNIT_OLD_PRICE * quantity;
                
                if (includeCylinderCheckbox.checked) {
                    basePrice += CYLINDER_PRICE * quantity;
                    oldBasePrice += CYLINDER_PRICE * quantity;
                }

                currentPriceEl.textContent = formatCurrency(basePrice);
                oldPriceEl.textContent = formatCurrency(oldBasePrice);
                
                const unitPrice = UNIT_REFILL_PRICE + (includeCylinderCheckbox.checked ? CYLINDER_PRICE : 0);
                unitPriceLabelEl.textContent = `Valor de uma recarga: ${formatCurrency(unitPrice)}`;
            };

            // Event Listeners
            decreaseBtn.addEventListener('click', () => {
                if (quantity > 1) {
                    quantity--;
                    quantityEl.textContent = quantity;
                    updatePricing();
                }
            });

            increaseBtn.addEventListener('click', () => {
                quantity++;
                quantityEl.textContent = quantity;
                updatePricing();
            });

            includeCylinderCheckbox.addEventListener('change', () => {
                updatePricing();
            });

            // Countdown Timer Logic
            const startCountdown = () => {
                const targetDate = new Date();
                targetDate.setDate(targetDate.getDate() + 4);
                targetDate.setHours(targetDate.getHours() + 8);
                targetDate.setMinutes(targetDate.getMinutes() + 11);

                const updateTimer = () => {
                    const now = new Date().getTime();
                    const distance = targetDate.getTime() - now;

                    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                    const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                    const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));

                    countdownEl.textContent = `${days}d ${hours}h ${minutes}m`;

                    if (distance < 0) {
                        clearInterval(timerInterval);
                        countdownEl.textContent = "EXPIRADO";
                    }
                };

                const timerInterval = setInterval(updateTimer, 60000);
                updateTimer();
            };

            // Initialize
            startCountdown();
            updatePricing();
        });
    </script>
</body>
</html>
